<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه دیجیتال</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>🛒 فروشگاه دیجیتال</h1>
</header>

<nav>
    <button onclick="showSection('shop')">خرید محصولات</button>
    <button onclick="showSection('wallet')">کیف پول</button>
    <button onclick="showSection('support')">پشتیبانی</button>
    <button onclick="adminLogin()">Admin</button>
</nav>

<main>
    <section id="shop" class="active">
        <div class="product" data-name="پلن 1 ماهه" data-price="100000">
            <h3>پلن 1 ماهه</h3>
            <p>قیمت: 100,000 تومان</p>
            <button onclick="buy(this)">خرید</button>
        </div>
        <div class="product" data-name="پلن 3 ماهه" data-price="250000">
            <h3>پلن 3 ماهه</h3>
            <p>قیمت: 250,000 تومان</p>
            <button onclick="buy(this)">خرید</button>
        </div>
    </section>

    <section id="wallet">
        <h2>💰 کیف پول شما</h2>
        <p id="balance">موجودی: 0 تومان</p>
    </section>

    <section id="support">
        <h2>📩 پشتیبانی</h2>
        <textarea id="supportMsg" placeholder="پیام خود را بنویسید..."></textarea>
        <button onclick="sendSupport()">ارسال پیام</button>
    </section>

    <section id="adminPanel" class="hidden">
        <h2>پنل ادمین</h2>
        <p>مدیریت محصولات و سفارش‌ها</p>
        <div id="adminProducts"></div>
        <input type="text" id="newProductName" placeholder="نام محصول">
        <input type="number" id="newProductPrice" placeholder="قیمت">
        <button onclick="addProduct()">اضافه کردن محصول</button>
    </section>
</main>

<footer>
    <p>2026 تمام حقوق محفوظ است nobody</p>
</footer>

<script src="script.js"></script>
</body>
</html>
